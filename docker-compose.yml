version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
  
  ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: ["python", "-m", "streamlit", "run", "src/ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      - api
    restart: unless-stopped